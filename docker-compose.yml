version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kinh_top
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/kinh_top
      JWT_SECRET: supersecretjwtkey
      JWT_REFRESH_SECRET: supersecretrefreshkey
      CLOUDINARY_CLOUD_NAME: demo
      CLOUDINARY_API_KEY: your_api_key
      CLOUDINARY_API_SECRET: your_api_secret
    ports:
      - '4000:4000'
    command: sh -c "pnpm install && pnpm --filter server build && pnpm --filter server start:prod"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - '3000:3000'
    command: sh -c "pnpm install && pnpm --filter client build && pnpm --filter client start"

volumes:
  postgres-data:
